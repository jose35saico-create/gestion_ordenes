apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      name: order-service
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: andersonburga/order-service:latest
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: order-service-config
      restartPolicy: Always
      